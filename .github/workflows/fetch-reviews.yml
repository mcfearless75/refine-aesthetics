name: Fetch Google Reviews

# Runs daily at 6 AM UTC and can be triggered manually.
# Requires ONE GitHub repository secret:
#   GOOGLE_PLACES_API_KEY — your Google Places API key (Places API must be enabled)
#
# The Place ID is discovered automatically via text search — no need to add it manually.
#
# To add the secret:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch reviews from Google Places API
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, datetime

          api_key = os.environ['GOOGLE_API_KEY']

          # Step 1: Find the Place ID by text search
          find_url = (
              "https://maps.googleapis.com/maps/api/place/findplacefromtext/json"
              "?input=Refine+Aesthetics+Wirral+56+Grange+Rd+West+Kirby"
              "&inputtype=textquery"
              "&fields=place_id"
              f"&key={api_key}"
          )
          with urllib.request.urlopen(find_url) as resp:
              find_data = json.loads(resp.read().decode())
          candidates = find_data.get('candidates', [])
          if not candidates:
              raise RuntimeError('Place not found via text search')
          place_id = candidates[0]['place_id']
          print(f'Resolved place_id: {place_id}')

          url = (
              "https://maps.googleapis.com/maps/api/place/details/json"
              f"?place_id={place_id}"
              "&fields=name,rating,user_ratings_total,reviews"
              "&reviews_sort=newest"
              f"&key={api_key}"
          )

          with urllib.request.urlopen(url) as resp:
              data = json.loads(resp.read().decode())

          result = data.get('result', {})
          out = {
              "last_updated": datetime.date.today().isoformat(),
              "aggregate": {
                  "rating": result.get('rating', 5.0),
                  "total": result.get('user_ratings_total', 0)
              },
              "reviews": [
                  {
                      "author": r.get('author_name', 'Verified Client'),
                      "rating": r.get('rating', 5),
                      "text": r.get('text', '').strip(),
                      "date": datetime.datetime.utcfromtimestamp(
                          r.get('time', 0)
                      ).strftime('%Y-%m-%d')
                  }
                  for r in result.get('reviews', [])
                  if r.get('rating', 0) >= 4 and r.get('text', '').strip()
              ]
          }

          with open('reviews.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, indent=2, ensure_ascii=False)

          print(f"Fetched {len(out['reviews'])} reviews — "
                f"{out['aggregate']['rating']}/5 from {out['aggregate']['total']} total")
          PYEOF

      - name: Commit reviews if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --staged --quiet \
            && echo "No changes to reviews.json" \
            || (git commit -m "chore: refresh Google reviews [skip ci]" && git push)
