name: Fetch Google Reviews

# Runs daily at 6 AM UTC and can be triggered manually.
# Requires ONE GitHub repository secret:
#   GOOGLE_PLACES_API_KEY — your Google Places API key (Places API must be enabled)
#
# The Place ID is discovered automatically via text search — no need to add it manually.
#
# To add the secret:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch reviews from Google Places API
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os, datetime

          api_key = os.environ['GOOGLE_API_KEY']
          headers = {
              'Content-Type': 'application/json',
              'X-Goog-Api-Key': api_key,
              'X-Goog-FieldMask': 'places.id,places.displayName,places.rating,places.userRatingCount',
          }

          # Step 1: Find the Place ID using Places API (New) Text Search
          search_payload = json.dumps({
              'textQuery': 'Refine Aesthetics Wirral 56 Grange Rd West Kirby'
          }).encode()
          req = urllib.request.Request(
              'https://places.googleapis.com/v1/places:searchText',
              data=search_payload,
              headers=headers,
              method='POST'
          )
          with urllib.request.urlopen(req) as resp:
              search_data = json.loads(resp.read().decode())
          places = search_data.get('places', [])
          if not places:
              raise RuntimeError('Place not found via text search')
          place_id = places[0]['id']
          print(f'Resolved place_id: {place_id}')

          # Step 2: Fetch place details including reviews
          detail_headers = {
              'X-Goog-Api-Key': api_key,
              'X-Goog-FieldMask': 'id,displayName,rating,userRatingCount,reviews',
          }
          req2 = urllib.request.Request(
              f'https://places.googleapis.com/v1/places/{place_id}',
              headers=detail_headers,
              method='GET'
          )
          with urllib.request.urlopen(req2) as resp:
              place = json.loads(resp.read().decode())

          raw_reviews = place.get('reviews', [])
          out = {
              'last_updated': datetime.date.today().isoformat(),
              'aggregate': {
                  'rating': place.get('rating', 5.0),
                  'total': place.get('userRatingCount', 0),
              },
              'reviews': [
                  {
                      'author': r.get('authorAttribution', {}).get('displayName', 'Verified Client'),
                      'rating': r.get('rating', 5),
                      'text': r.get('text', {}).get('text', '').strip(),
                      'date': r.get('publishTime', '')[:10],
                  }
                  for r in raw_reviews
                  if r.get('rating', 0) >= 4 and r.get('text', {}).get('text', '').strip()
              ],
          }

          with open('reviews.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, indent=2, ensure_ascii=False)

          print(f"Fetched {len(out['reviews'])} reviews — "
                f"{out['aggregate']['rating']}/5 from {out['aggregate']['total']} total")
          PYEOF

      - name: Commit reviews if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --staged --quiet \
            && echo "No changes to reviews.json" \
            || (git commit -m "chore: refresh Google reviews [skip ci]" && git push)
